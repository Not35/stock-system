<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #faf8ef; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none;}
        .grid-container { background-color: #bbada0; padding: 10px; border-radius: 10px; width: 300px; height: 300px; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 10px; position: relative;}
        .grid-cell { background-color: #cdc1b4; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; color: #776e65; transition: all 0.1s ease-in-out;}
        
        /* สีกระเบื้องตามตัวเลข */
        .val-2 { background-color: #eee4da; }
        .val-4 { background-color: #ede0c8; }
        .val-8 { background-color: #f2b179; color: white;}
        .val-16 { background-color: #f59563; color: white;}
        .val-32 { background-color: #f67c5f; color: white;}
        .val-64 { background-color: #f65e3b; color: white;}
        .val-128 { background-color: #edcf72; color: white; font-size: 20px;}
        .val-256 { background-color: #edcc61; color: white; font-size: 20px;}
        .val-512 { background-color: #edc850; color: white; font-size: 20px;}
        .val-1024 { background-color: #edc53f; color: white; font-size: 16px;}
        .val-2048 { background-color: #edc22e; color: white; font-size: 16px; box-shadow: 0 0 10px rgba(243, 215, 116, 0.5);}
    </style>
</head>
<body>
    <div class="flex justify-between w-[300px] mb-4 items-end">
        <h1 class="text-4xl font-bold text-[#776e65]">2048</h1>
        <div class="bg-[#bbada0] px-4 py-1.5 rounded-lg text-center text-white">
            <div class="text-[10px] text-[#eee4da] uppercase font-bold">Score</div>
            <div id="score" class="font-bold">0</div>
        </div>
    </div>
    <div class="text-sm text-[#776e65] mb-4 w-[300px]">เลื่อน (ปัดหน้าจอ) เพื่อรวมตัวเลขให้ได้ 2048!</div>

    <div class="grid-container" id="grid">
        <!-- Cells generated by JS -->
    </div>

    <button onclick="initGame()" class="mt-6 bg-[#8f7a66] text-white font-bold py-2.5 px-6 rounded-lg hover:bg-[#9f8b77]">New Game</button>

    <script>
        const gridDisplay = document.getElementById('grid');
        const scoreDisplay = document.getElementById('score');
        let squares = [];
        let score = 0;

        function initGame() {
            gridDisplay.innerHTML = '';
            squares = [];
            score = 0;
            scoreDisplay.innerHTML = score;
            for (let i = 0; i < 16; i++) {
                let square = document.createElement('div');
                square.className = 'grid-cell';
                square.innerHTML = '';
                gridDisplay.appendChild(square);
                squares.push(square);
            }
            generateNumber();
            generateNumber();
        }

        function generateNumber() {
            let emptySquares = squares.map((sq, i) => sq.innerHTML === '' ? i : null).filter(i => i !== null);
            if (emptySquares.length === 0) return;
            let randomSquare = emptySquares[Math.floor(Math.random() * emptySquares.length)];
            squares[randomSquare].innerHTML = Math.random() > 0.1 ? 2 : 4;
            updateColors();
            checkForGameOver();
        }

        function updateColors() {
            squares.forEach(sq => {
                sq.className = 'grid-cell'; // Reset
                if (sq.innerHTML !== '') sq.classList.add('val-' + sq.innerHTML);
            });
        }

        // --- ระบบควบคุม (ลูกศรคีย์บอร์ด) ---
        function moveRight() {
            let moved = false;
            for (let i = 0; i < 16; i += 4) {
                let row = [parseInt(squares[i].innerHTML)||0, parseInt(squares[i+1].innerHTML)||0, parseInt(squares[i+2].innerHTML)||0, parseInt(squares[i+3].innerHTML)||0];
                let filteredRow = row.filter(num => num);
                let missing = 4 - filteredRow.length;
                let zeros = Array(missing).fill(0);
                let newRow = zeros.concat(filteredRow);
                for (let j = 0; j < 4; j++) { if(squares[i+j].innerHTML != (newRow[j]===0?'':newRow[j])) moved=true; squares[i+j].innerHTML = newRow[j] === 0 ? '' : newRow[j]; }
            }
            return moved;
        }

        function moveLeft() {
            let moved = false;
            for (let i = 0; i < 16; i += 4) {
                let row = [parseInt(squares[i].innerHTML)||0, parseInt(squares[i+1].innerHTML)||0, parseInt(squares[i+2].innerHTML)||0, parseInt(squares[i+3].innerHTML)||0];
                let filteredRow = row.filter(num => num);
                let missing = 4 - filteredRow.length;
                let zeros = Array(missing).fill(0);
                let newRow = filteredRow.concat(zeros);
                for (let j = 0; j < 4; j++) { if(squares[i+j].innerHTML != (newRow[j]===0?'':newRow[j])) moved=true; squares[i+j].innerHTML = newRow[j] === 0 ? '' : newRow[j]; }
            }
            return moved;
        }

        function moveDown() {
            let moved = false;
            for (let i = 0; i < 4; i++) {
                let col = [parseInt(squares[i].innerHTML)||0, parseInt(squares[i+4].innerHTML)||0, parseInt(squares[i+8].innerHTML)||0, parseInt(squares[i+12].innerHTML)||0];
                let filteredCol = col.filter(num => num);
                let missing = 4 - filteredCol.length;
                let zeros = Array(missing).fill(0);
                let newCol = zeros.concat(filteredCol);
                for (let j = 0; j < 4; j++) { if(squares[i+(j*4)].innerHTML != (newCol[j]===0?'':newCol[j])) moved=true; squares[i+(j*4)].innerHTML = newCol[j] === 0 ? '' : newCol[j]; }
            }
            return moved;
        }

        function moveUp() {
            let moved = false;
            for (let i = 0; i < 4; i++) {
                let col = [parseInt(squares[i].innerHTML)||0, parseInt(squares[i+4].innerHTML)||0, parseInt(squares[i+8].innerHTML)||0, parseInt(squares[i+12].innerHTML)||0];
                let filteredCol = col.filter(num => num);
                let missing = 4 - filteredCol.length;
                let zeros = Array(missing).fill(0);
                let newCol = filteredCol.concat(zeros);
                for (let j = 0; j < 4; j++) { if(squares[i+(j*4)].innerHTML != (newCol[j]===0?'':newCol[j])) moved=true; squares[i+(j*4)].innerHTML = newCol[j] === 0 ? '' : newCol[j]; }
            }
            return moved;
        }

        function combineRow() {
            let combined = false;
            for (let i = 0; i < 15; i++) {
                if (squares[i].innerHTML === squares[i + 1].innerHTML && squares[i].innerHTML !== '' && (i+1)%4 !== 0) {
                    let total = parseInt(squares[i].innerHTML) + parseInt(squares[i + 1].innerHTML);
                    squares[i].innerHTML = total;
                    squares[i + 1].innerHTML = '';
                    score += total;
                    scoreDisplay.innerHTML = score;
                    combined = true;
                }
            }
            return combined;
        }

        function combineColumn() {
            let combined = false;
            for (let i = 0; i < 12; i++) {
                if (squares[i].innerHTML === squares[i + 4].innerHTML && squares[i].innerHTML !== '') {
                    let total = parseInt(squares[i].innerHTML) + parseInt(squares[i + 4].innerHTML);
                    squares[i].innerHTML = total;
                    squares[i + 4].innerHTML = '';
                    score += total;
                    scoreDisplay.innerHTML = score;
                    combined = true;
                }
            }
            return combined;
        }

        function control(e) {
            let moved = false;
            if(e.keyCode === 39) { let m = moveRight(); let c = combineRow(); let m2 = moveRight(); moved = m||c||m2; }
            else if(e.keyCode === 37) { let m = moveLeft(); let c = combineRow(); let m2 = moveLeft(); moved = m||c||m2; }
            else if(e.keyCode === 38) { let m = moveUp(); let c = combineColumn(); let m2 = moveUp(); moved = m||c||m2; }
            else if(e.keyCode === 40) { let m = moveDown(); let c = combineColumn(); let m2 = moveDown(); moved = m||c||m2; }
            if(moved) { updateColors(); setTimeout(generateNumber, 100); }
        }
        document.addEventListener('keyup', control);

        // --- ระบบปัดหน้าจอ (Swipe สำหรับมือถือ) ---
        let touchstartX = 0; let touchstartY = 0; let touchendX = 0; let touchendY = 0;
        document.getElementById('grid').addEventListener('touchstart', function(event) { touchstartX = event.changedTouches[0].screenX; touchstartY = event.changedTouches[0].screenY; }, false);
        document.getElementById('grid').addEventListener('touchend', function(event) {
            touchendX = event.changedTouches[0].screenX; touchendY = event.changedTouches[0].screenY;
            handleSwipe();
        }, false); 

        function handleSwipe() {
            let moved = false;
            let diffX = touchendX - touchstartX; let diffY = touchendY - touchstartY;
            if(Math.abs(diffX) > Math.abs(diffY)) {
                if(diffX > 30) { let m=moveRight(); let c=combineRow(); let m2=moveRight(); moved=m||c||m2; } // ปัดขวา
                else if(diffX < -30) { let m=moveLeft(); let c=combineRow(); let m2=moveLeft(); moved=m||c||m2; } // ปัดซ้าย
            } else {
                if(diffY > 30) { let m=moveDown(); let c=combineColumn(); let m2=moveDown(); moved=m||c||m2; } // ปัดลง
                else if(diffY < -30) { let m=moveUp(); let c=combineColumn(); let m2=moveUp(); moved=m||c||m2; } // ปัดขึ้น
            }
            if(moved) { updateColors(); setTimeout(generateNumber, 100); }
        }

        function checkForGameOver() {
            let zeros = 0;
            for (let i=0; i<squares.length; i++) { if (squares[i].innerHTML == '') zeros++; }
            if (zeros === 0) {
                // เช็คว่ารวมได้อีกไหม
                let canCombine = false;
                for (let i = 0; i < 15; i++) { if (squares[i].innerHTML === squares[i + 1].innerHTML && (i+1)%4 !== 0) canCombine=true; }
                for (let i = 0; i < 12; i++) { if (squares[i].innerHTML === squares[i + 4].innerHTML) canCombine=true; }
                
                if(!canCombine) {
                    setTimeout(() => alert("Game Over! คะแนนของคุณคือ: " + score), 300);
                }
            }
        }

        initGame();
    </script>
</body>
</html>
